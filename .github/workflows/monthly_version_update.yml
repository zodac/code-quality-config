name: Versions Update

on:
  push:
    branches: [ master ]
    paths:
      - ".github/workflows/monthly_version_update.yml"
  schedule:
    # Run at 02:00 on the first of the month
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  update_versions:
    name: Versions Update
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      security-events: write
    env:
      has_changes: "false"

    steps:
      # Mint a short-lived installation token from the org-owned GitHub App
      # This token carries `workflows: write`, which the default GITHUB_TOKEN lacks
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git user
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Update project versions
        run: .github/scripts/update_dependency_versions.sh

      - name: Check for changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Commit changes
        id: change_commit
        if: env.has_changes == 'true'
        run: |
          git add .
          git commit -m '[CI] Updating versions'

      - name: Push changes
        if: env.has_changes == 'true'
        uses: ad-m/github-push-action@v1.1.0
        with:
          branch: master
          github_token: ${{ steps.app-token.outputs.token }}
